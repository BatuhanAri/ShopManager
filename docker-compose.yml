services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: shopmanager_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ShopManagerDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: eren1234
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ShopManagerDb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── ASP.NET Core App ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopmanager_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=ShopManagerDb;Username=postgres;Password=eren1234"
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
